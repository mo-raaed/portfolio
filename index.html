        ]

    <!-- Prevent FOUC: always resolve and apply a theme class before first
         paint (saved choice, else system preference). The Heritage tokens
         rely on this — there are no prefers-color-scheme CSS fallbacks. -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var theme =
          saved === 'light' || saved === 'dark'
            ? saved
            : window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light';
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased selection:bg-primary/20 selection:text-foreground">
    <div id="root"></div>

  </body>
